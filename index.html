  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

m:uppercase;\n    align-self:flex-start;\n  }\n  .logo-drop label:hover{background:var(--accent)}\n  .logo-drop input[type=file]{display:none}\n  .logo-drop .clear{\n    background:transparent;border:0;color:var(--mute);cursor:pointer;\n    font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;\n    text-align:left;padding:0;align-self:flex-start;\n  }\n  .logo-drop .clear:hover{color:var(--accent)}\n\n  .swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}\n  .swatch{\n    aspect-ratio:1/1;border-radius:10px;cursor:pointer;border:2px solid transparent;\n    position:relative;transition:transform .12s;\n  }\n  .swatch:hover{transform:scale(1.06)}\n  .swatch.active{border-color:var(--ink);box-shadow:0 0 0 3px var(--paper),0 0 0 4px var(--ink)}\n  .swatch::after{content:\"\";position:absolute;inset:6px;border-radius:6px;background:inherit;background-color:inherit}\n\n  .font-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}\n  .font-opt{\n    background:var(--card);border:1px solid var(--rule);border-radius:10px;\n    padding:14px 10px;cursor:pointer;text-align:center;transition:border-color .12s, background .12s;\n    display:flex;flex-direction:column;align-items:center;gap:6px;\n  }\n  .font-opt:hover{border-color:var(--rule-2)}\n  .font-opt.active{border-color:var(--accent);background:var(--accent-soft)}\n  .font-opt .sample{font-size:28px;line-height:1;color:var(--ink)}\n  .font-opt .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}\n\n  @media (max-width:1100px){\n    .hero{grid-template-columns:1fr;gap:24px}\n    .hero h1{font-size:60px}\n    .stats{border-left:0;border-top:1px solid var(--rule);padding-top:14px}\n    .stat{padding-left:0}\n    .topbar-inner{grid-template-columns:auto 1fr auto;gap:14px}\n    .navtabs{grid-column:1 / -1;justify-content:flex-start;order:5}\n    .search{order:3;min-width:0}\n  }\n\n  @media print{\n    @page{size:Letter landscape;margin:.4in}\n    .topbar{position:static;border-bottom:1px solid #000}\n    body{background:white}\n    .hero, .section{break-inside:avoid}\n    .search,.navtabs,.brand-btn,.drawer,.scrim{display:none !important}\n    table.t tbody tr{break-inside:avoid}\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ─── Top bar ──────────────────────────────────────── -->\n<div class=\"topbar\">\n  <div class=\"topbar-inner\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\" id=\"brandMark\">AE<\u002Fdiv>\n      <span class=\"name\"><span class=\"ws\" id=\"workspaceName\">AEO Sales Cockpit<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <nav class=\"navtabs\" id=\"navtabs\">\n      <a href=\"#offers\" class=\"active\"><span class=\"n\">01<\u002Fspan> Services<\u002Fa>\n      <a href=\"#how\"><span class=\"n\">02<\u002Fspan> How to Do It<\u002Fa>\n      <a href=\"#say\"><span class=\"n\">03<\u002Fspan> What to Say<\u002Fa>\n    <\u002Fnav>\n    <div class=\"search\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3.5-3.5\"><\u002Fpath><\u002Fsvg>\n      <input id=\"filter\" placeholder=\"Filter all tables…\" autocomplete=\"off\">\n      <kbd>/<\u002Fkbd>\n    <\u002Fdiv>\n    <button class=\"brand-btn\" id=\"openBrand\" title=\"Brand the cockpit\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 4 6v6c0 5 3.5 9.3 8 10 4.5-.7 8-5 8-10V6z\"><\u002Fpath><\u002Fsvg>\n      Brand\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── Hero ──────────────────────────────────────────── -->\n<section class=\"hero\">\n  <div>\n    <span class=\"eye\">Sales Enablement · For Agencies &amp; SaaS<\u002Fspan>\n    <h1>Who you're<br>talking to.<br><em>What to say.<\u002Fem><\u002Fh1>\n    <p class=\"sub\">Three working tables for every conversation with an SMB. Match their situation to the service, see exactly how to deliver it, and grab the line that lands. Brand it as your own and walk it into the meeting.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"stats\">\n    <div class=\"stat\"><div class=\"n\"><em>68%<\u002Fem><\u002Fdiv><div class=\"lbl\">of local searches now include an AI Overview that recommends businesses, not lists them.<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"n\"><em>3.2×<\u002Fem><\u002Fdiv><div class=\"lbl\">more human traffic for AI-crawled sites. 2.7× form fills. 2.5× click-to-call.<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"n\"><em>4×<\u002Fem><\u002Fdiv><div class=\"lbl\">crawl-rate lift when GBP sync + Blog + Local Schema + Dynamic Pages are all on.<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"n\"><em>99%<\u002Fem><\u002Fdiv><div class=\"lbl\">of SMB sites are below that threshold today. The gap is the opportunity.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── TABLE 1: Services ────────────────────────────── -->\n<section class=\"section\" id=\"offers\">\n  <div class=\"section-hdr\">\n    <div class=\"left\">\n      <span class=\"n\">Table 01<\u002Fspan>\n      <h2>Services Unlocked<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"right\">\n      <span class=\"count\">Showing <b><span data-count-of=\"t1\">12<\u002Fspan><\u002Fb> of 12 services<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tbl-wrap\">\n    <table class=\"t t1\">\n      <thead>\n        <tr>\n          <th>Service<\u002Fth>\n          <th>Core Pain Point<\u002Fth>\n          <th>What You Can Sell Now<\u002Fth>\n          <th>Commercial Model<\u002Fth>\n          <th>Best Entry Point<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><span class=\"lab\">SEO<\u002Fspan><span class=\"tag\">Reposition<\u002Fspan><\u002Ftd>\n          <td>Traditional SEO is being disrupted by AI answers, AI Overviews, and zero-click behavior. Clients need to be cited and recommended, not just ranked.<\u002Ftd>\n          <td>AEO audit, AI visibility monitoring, citation tracking, competitor visibility reports, content optimization.<\u002Ftd>\n          <td><span class=\"pill\">Monthly retainer + paid audit<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"You may rank, but are you being recommended by AI?\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Local Marketing<\u002Fspan><span class=\"tag\">Local<\u002Fspan><\u002Ftd>\n          <td>SMBs do not know how to show up in AI answers for local-intent searches.<\u002Ftd>\n          <td>Local AEO package: GBP sync, listings cleanup, reviews, local schema, local FAQ content, service-area pages.<\u002Ftd>\n          <td><span class=\"pill\">Monthly local retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"When someone asks AI for a local provider, are you in the shortlist?\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Web Design / Build<\u002Fspan><span class=\"tag\">Project<\u002Fspan><\u002Ftd>\n          <td>One-off website builds are commoditized and hard to defend after launch.<\u002Ftd>\n          <td>AI-ready website rebuilds, technical AEO fixes, structured site architecture, schema implementation, FAQ expansion.<\u002Ftd>\n          <td><span class=\"pill\">Project + retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Your website was built for humans. Now it also needs to be readable by AI.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Content Marketing<\u002Fspan><span class=\"tag\">Content<\u002Fspan><\u002Ftd>\n          <td>Clients need more content and fresher content, but it's hard to scale manual production profitably.<\u002Ftd>\n          <td>AI visibility content engine: blogs, FAQs, service pages, location pages, answer-first content refreshes.<\u002Ftd>\n          <td><span class=\"pill\">Monthly content program<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI cites businesses that answer specific questions clearly and frequently.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Paid Media / Lead Gen<\u002Fspan><span class=\"tag\">Leads<\u002Fspan><\u002Ftd>\n          <td>Paid acquisition is expensive and clients want durable lead sources.<\u002Ftd>\n          <td>AI visibility lead-generation program connecting citations, mentions, AI traffic, and conversions.<\u002Ftd>\n          <td><span class=\"pill\">Lead-gen retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI visibility is becoming a new lead source. Let's measure and grow it.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Full-Service Digital<\u002Fspan><span class=\"tag\">Bundle<\u002Fspan><\u002Ftd>\n          <td>Clients expect one partner to manage discovery, website, content, reputation, reporting, and optimization.<\u002Ftd>\n          <td>End-to-end AEO growth system: audit, optimize, migrate, content, presence, monitoring, reporting.<\u002Ftd>\n          <td><span class=\"pill\">Multi-service retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"We will manage your visibility across search, AI, content, and local presence.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Vertical / Niche<\u002Fspan><span class=\"tag\">Scale<\u002Fspan><\u002Ftd>\n          <td>Multi-location or service-area clients need many specific pages without exploding production costs.<\u002Ftd>\n          <td>Scaled location + service page programs, vertical-specific AI discovery packages, structured content systems.<\u002Ftd>\n          <td><span class=\"pill\">Setup + recurring<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI needs clear answers for each service, location, and customer intent.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Reputation / Listings<\u002Fspan><span class=\"tag\">Presence<\u002Fspan><\u002Ftd>\n          <td>Reviews, business facts, and listings are fragmented. AI may pull stale or inconsistent information.<\u002Ftd>\n          <td>Presence optimization: listings accuracy, GBP sync, review amplification, sentiment improvement, competitor tracking.<\u002Ftd>\n          <td><span class=\"pill\">Monthly presence retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI needs trustworthy business facts before it recommends you.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Existing Client Expansion<\u002Fspan><span class=\"tag\">Expand<\u002Fspan><\u002Ftd>\n          <td>You need a reason to expand current clients after the original site launch.<\u002Ftd>\n          <td>AEO monitoring, visibility snapshots, content refreshes, FAQ optimization, technical cleanup, local presence upgrades.<\u002Ftd>\n          <td><span class=\"pill\">Expansion + retention retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Your site is live. Now we need to make sure AI can find and cite it.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">New Client Acquisition<\u002Fspan><span class=\"tag\">Win<\u002Fspan><\u002Ftd>\n          <td>You need a sharper hook than generic SEO audits or website redesign pitches.<\u002Ftd>\n          <td>AI Visibility Snapshot: benchmark prospect visibility, compare competitors, show citation gaps, recommend fixes.<\u002Ftd>\n          <td><span class=\"pill\">Lead magnet → paid audit → retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Your competitors may already be showing up in AI answers. Let's check.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Website Migration<\u002Fspan><span class=\"tag\">Migrate<\u002Fspan><\u002Ftd>\n          <td>Clients are stuck on old, slow, messy, or hard-to-manage websites that are not built for AI discovery.<\u002Ftd>\n          <td>AI-ready website migration, including structured rebuild, schema, dynamic pages, local data, content, and monitoring.<\u002Ftd>\n          <td><span class=\"pill\">Migration project + AEO retainer<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Your current site is limiting how AI understands and recommends your business.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Automation / Technical<\u002Fspan><span class=\"tag\">Platform<\u002Fspan><\u002Ftd>\n          <td>Manual audits, reporting, and optimization do not scale across many clients.<\u002Ftd>\n          <td>Automated AEO operations layer: audit agents, reporting agents, content agents, competitive alerts, API-powered workflows.<\u002Ftd>\n          <td><span class=\"pill\">High-tier managed service<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"We can automate the visibility workflow across your entire client portfolio.\"<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── TABLE 2: How to Do It ────────────────────────── -->\n<section class=\"section\" id=\"how\">\n  <div class=\"section-hdr\">\n    <div class=\"left\">\n      <span class=\"n\">Table 02<\u002Fspan>\n      <h2>How to Do It<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"right\">\n      <span class=\"count\">Showing <b><span data-count-of=\"t2\">12<\u002Fspan><\u002Fb> of 12 plays<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tbl-wrap\">\n    <table class=\"t t2\">\n      <thead>\n        <tr>\n          <th>Play<\u002Fth>\n          <th>What You Do<\u002Fth>\n          <th>Supporting Solution<\u002Fth>\n          <th>Output for the Client<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><span class=\"lab\">AI Visibility Snapshot<\u002Fspan><span class=\"tag\">Top of funnel<\u002Fspan><\u002Ftd>\n          <td>Run an initial benchmark showing whether the SMB appears in AI answers, where competitors appear, and what content or trust signals are missing.<\u002Ftd>\n          <td>AEO visibility score, competitor comparison, brand mentions, AI traffic insights, client-ready snapshot reports.<\u002Ftd>\n          <td>Simple report showing current AI visibility, competitor gaps, and next actions.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">AEO Audit<\u002Fspan><span class=\"tag\">Diagnose<\u002Fspan><\u002Ftd>\n          <td>Diagnose the site's AI-readiness across structure, schema, content depth, local signals, FAQs, reviews, and technical crawlability.<\u002Ftd>\n          <td>AEO dashboard, crawler monitoring, visibility metrics, recommendations, schema support, site audit workflows.<\u002Ftd>\n          <td>Prioritized action plan for improving AI visibility.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">AI-Ready Website Migration<\u002Fspan><span class=\"tag\">Project<\u002Fspan><\u002Ftd>\n          <td>Move clients from legacy CMSs, weak builders, or outdated sites into a site structured for AI discovery.<\u002Ftd>\n          <td>Modern site builder, performance foundations, server-side rendering, schema, dynamic pages, templates, local integrations.<\u002Ftd>\n          <td>Rebuilt site that is faster, more structured, easier to manage, and better prepared for AI crawlers.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Technical AEO Fixes<\u002Fspan><span class=\"tag\">Technical<\u002Fspan><\u002Ftd>\n          <td>Clean up site structure, improve semantic clarity, add schema, improve page hierarchy, optimize internal linking, and make business facts machine-readable.<\u002Ftd>\n          <td>Local schema, FAQ schema, product/service schema, SEO controls, structured content, dynamic pages.<\u002Ftd>\n          <td>Site that gives AI clearer answers about who the business is, what it offers, where it operates, and why it should be trusted.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Local AEO Package<\u002Fspan><span class=\"tag\">Local<\u002Fspan><\u002Ftd>\n          <td>Sync and clean up local business data, improve GBP consistency, add local schema, build service-area content, and expand location-specific pages.<\u002Ftd>\n          <td>Google Business Profile sync, local listings, local schema, dynamic pages, reviews, connected data.<\u002Ftd>\n          <td>Stronger local presence for AI engines, maps, and local-intent searches.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Content Expansion Program<\u002Fspan><span class=\"tag\">Content<\u002Fspan><\u002Ftd>\n          <td>Build and refresh content around real customer questions: blogs, FAQs, comparison pages, service pages, pricing pages, and location pages.<\u002Ftd>\n          <td>Blog tools, AI blog generation, blog optimization agent, FAQ agent, dynamic pages, content scheduling.<\u002Ftd>\n          <td>Fresh, structured, answer-first content designed to be cited by AI engines.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">FAQ / Answer Optimization<\u002Fspan><span class=\"tag\">Content<\u002Fspan><\u002Ftd>\n          <td>Turn key pages into direct-answer pages with structured FAQs, question-based headings, short answer blocks, and schema.<\u002Ftd>\n          <td>FAQ agent, FAQ schema, AI content tools, page editor, structured content blocks.<\u002Ftd>\n          <td>Pages that are easier for AI systems to parse, quote, and recommend.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Presence Optimization<\u002Fspan><span class=\"tag\">Presence<\u002Fspan><\u002Ftd>\n          <td>Improve trust signals by aligning listings, reviews, business facts, sentiment, and external validation.<\u002Ftd>\n          <td>GBP sync, local listings, review widgets, sentiment tracking, brand monitoring, competitor tracking.<\u002Ftd>\n          <td>More consistent and trustworthy online presence across AI-readable sources.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Competitive Intelligence<\u002Fspan><span class=\"tag\">Insight<\u002Fspan><\u002Ftd>\n          <td>Track where competitors appear, which prompts they win, which topics they dominate, and where the client is missing.<\u002Ftd>\n          <td>Competitor configuration, prompt tracking, AI model tracking, geo customization, visibility comparisons.<\u002Ftd>\n          <td>Ongoing competitor movement report and opportunity backlog.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">AEO Reporting Retainer<\u002Fspan><span class=\"tag\">Recurring<\u002Fspan><\u002Ftd>\n          <td>Send recurring reports showing visibility gains, citation changes, AI traffic, competitor movement, and lead/conversion impact.<\u002Ftd>\n          <td>Client-ready PDF snapshots, AEO dashboard, traffic from AI sources, brand mentions, conversions, API access.<\u002Ftd>\n          <td>Monthly proof of value that keeps clients engaged after launch.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Agentic AEO Operations<\u002Fspan><span class=\"tag\">Automate<\u002Fspan><\u002Ftd>\n          <td>Use AI agents or automated workflows to analyze AEO data, generate content briefs, refresh stale pages, produce reports, and flag opportunities.<\u002Ftd>\n          <td>AEO API, AEO data, blog optimization agent, FAQ agent, agent-ready workflows.<\u002Ftd>\n          <td>Scaled AEO execution without adding equivalent headcount.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Portfolio Expansion<\u002Fspan><span class=\"tag\">Grow<\u002Fspan><\u002Ftd>\n          <td>Run AEO audits across the existing customer base, segment accounts by visibility gaps and commercial value, and trigger targeted upsell campaigns.<\u002Ftd>\n          <td>Multi-site management, AEO dashboard, reporting snapshots, API, automation workflows.<\u002Ftd>\n          <td>Prioritized list of current clients ready for migration, content, local AEO, or monitoring upsells.<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── TABLE 3: What to Say ─────────────────────────── -->\n<section class=\"section\" id=\"say\">\n  <div class=\"section-hdr\">\n    <div class=\"left\">\n      <span class=\"n\">Table 03<\u002Fspan>\n      <h2>What to Say<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"right\">\n      <span class=\"count\">Showing <b><span data-count-of=\"t3\">12<\u002Fspan><\u002Fb> of 12 messages<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tbl-wrap\">\n    <table class=\"t t3\">\n      <thead>\n        <tr>\n          <th>Client Situation<\u002Fth>\n          <th>What to Say<\u002Fth>\n          <th>Why It Works<\u002Fth>\n          <th>Proof Point / Deliverable<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td><span class=\"lab\">Prospect doesn't know what AEO is<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Search is changing. Customers are no longer only clicking blue links. They are asking AI who to trust, who is nearby, and who to call. The question is whether AI can understand and recommend your business.\"<\u002Fspan><\u002Ftd>\n          <td>Educates without jargon. Creates urgency without fearmongering.<\u002Ftd>\n          <td>Snapshot showing current visibility, competitors, mentions, and gaps.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Prospect thinks SEO is enough<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Ranking on Google still matters, but it is no longer the whole game. AI engines choose a small set of businesses to recommend. We need to make sure your website, content, reviews, and business data are clear enough to be selected.\"<\u002Fspan><\u002Ftd>\n          <td>Repositions AEO as an expansion of SEO, not a replacement.<\u002Ftd>\n          <td>Visibility score, competitor comparison, crawler activity, citation gaps.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Prospect has an old website<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Your current site may look fine to a person, but AI systems need structure: clear services, locations, schema, FAQs, reviews, and fresh content. If AI cannot read it, it may ignore it.\"<\u002Fspan><\u002Ftd>\n          <td>Creates a practical reason for migration beyond design taste.<\u002Ftd>\n          <td>Rebuilt site with schema, dynamic pages, GBP sync, FAQs, and monitoring.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Prospect has low lead volume<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI visibility is becoming a lead-generation channel. If your business is cited or recommended in AI answers, those visitors can be more qualified because AI has already helped them narrow the options.\"<\u002Fspan><\u002Ftd>\n          <td>Connects AEO to revenue, not vanity metrics.<\u002Ftd>\n          <td>AI traffic, form submissions, click-to-call reporting, conversion tracking.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Local SMB wants more calls<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"When someone asks AI for the best provider nearby, the model looks for clear location, services, reviews, hours, and trust signals. We will make those signals easier to find and verify.\"<\u002Fspan><\u002Ftd>\n          <td>Makes local AEO concrete and actionable.<\u002Ftd>\n          <td>GBP sync, local schema, listings, reviews, service-area pages.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">SMB has thin content<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI needs specific answers. A five-page website usually does not give it enough information. We need pages that answer real customer questions by service, location, price, urgency, and use case.\"<\u002Fspan><\u002Ftd>\n          <td>Explains why content depth matters without sounding like generic blogging.<\u002Ftd>\n          <td>Blog posts, FAQs, service pages, location pages, structured answer blocks.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">SMB has inconsistent listings or reviews<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI engines do not only read your website. They compare your business facts across the web. If your listings, reviews, hours, or service details are inconsistent, trust goes down.\"<\u002Fspan><\u002Ftd>\n          <td>Ties reputation and listings work directly to AI visibility.<\u002Ftd>\n          <td>Listings cleanup, GBP sync, review widgets, sentiment tracking.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Existing client asks why they need ongoing work<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"AI visibility is not a one-time fix. Competitors change, AI models change, content gets stale, and customer questions evolve. We need to monitor and improve this continuously.\"<\u002Fspan><\u002Ftd>\n          <td>Justifies retainer after the initial build.<\u002Ftd>\n          <td>Monthly visibility snapshot, citation movement, competitor movement, recommendations.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Client wants proof<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"We will not just say we improved your visibility. We will show AI mentions, crawler activity, competitor comparisons, traffic from AI sources, and business outcomes like leads and calls.\"<\u002Fspan><\u002Ftd>\n          <td>Moves the discussion from effort to measurable outcomes.<\u002Ftd>\n          <td>Client-ready PDF snapshot and dashboard reporting.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Client is worried about complexity<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"You do not need to understand every AI model. That is our job. Your job is to run the business. Our job is to make sure AI can understand, trust, and recommend it.\"<\u002Fspan><\u002Ftd>\n          <td>Positions you as the trusted advisor.<\u002Ftd>\n          <td>Audit, implementation, monitoring, content, reporting — handled end-to-end.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Client is comparing partners<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"Most providers are still selling SEO as rankings and traffic. We are building your visibility system for how customers actually discover businesses now: search, AI answers, maps, reviews, and direct recommendations.\"<\u002Fspan><\u002Ftd>\n          <td>Differentiates you from generic SEO vendors.<\u002Ftd>\n          <td>Modern site, content engine, local presence, monitoring, reporting.<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td><span class=\"lab\">Client asks how this scales<\u002Fspan><\u002Ftd>\n          <td><span class=\"quote\">\"We have the infrastructure to manage this at scale: structured websites, local business data, dynamic pages, schema, content tools, AI visibility reporting, and automation through APIs.\"<\u002Fspan><\u002Ftd>\n          <td>Explains the platform advantage in business terms.<\u002Ftd>\n          <td>AI-ready site plus AEO dashboard, reports, and optimization workflows.<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── Footer ──────────────────────────────────────── -->\n<footer>\n  <div>\n    <div class=\"biglines\">\"The old offer was <i>we'll build your website.<\u002Fi><br>The new offer is <em>we'll make sure AI can find, understand, and recommend your business.<\u002Fem>\"<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"text-align:right\">\n    <div>Owner · <b><span id=\"footerOwner\">Your Sales Team<\u002Fspan><\u002Fb><\u002Fdiv>\n    <div>Audience · <b>SMB conversations<\u002Fb><\u002Fdiv>\n    <div>Internal Use · <b>Confidential<\u002Fb><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ─── Brand drawer ─────────────────────────────────── -->\n<div class=\"scrim\" id=\"scrim\"><\u002Fdiv>\n<aside class=\"drawer\" id=\"drawer\" aria-hidden=\"true\">\n  <header>\n    <h3>Brand the cockpit<\u002Fh3>\n    <button class=\"close\" id=\"closeBrand\" aria-label=\"Close\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fheader>\n  <div class=\"body\">\n    <div class=\"field\">\n      <span class=\"lbl\">Workspace name<\u002Fspan>\n      <input type=\"text\" id=\"wsInput\" placeholder=\"AEO Sales Cockpit\" maxlength=\"48\">\n      <div class=\"hint\">Shown next to your logo in the top bar.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <span class=\"lbl\">Logo<\u002Fspan>\n      <div class=\"logo-drop\" id=\"logoDrop\">\n        <div class=\"logo-prev\" id=\"logoPrev\"><span class=\"ph\">LOGO<\u002Fspan><\u002Fdiv>\n        <div class=\"actions\">\n          <label for=\"logoFile\">Upload image<\u002Flabel>\n          <input type=\"file\" id=\"logoFile\" accept=\"image/*\">\n          <button type=\"button\" class=\"clear\" id=\"clearLogo\">Remove<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hint\">PNG, JPG, or SVG. Drop a file or click upload.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <span class=\"lbl\">Accent color<\u002Fspan>\n      <div class=\"swatches\" id=\"swatches\">\n        <div class=\"swatch active\" data-color=\"#FF552E\" style=\"background:#FF552E\"><\u002Fdiv>\n        <div class=\"swatch\" data-color=\"#2563EB\" style=\"background:#2563EB\"><\u002Fdiv>\n        <div class=\"swatch\" data-color=\"#16A34A\" style=\"background:#16A34A\"><\u002Fdiv>\n        <div class=\"swatch\" data-color=\"#9333EA\" style=\"background:#9333EA\"><\u002Fdiv>\n        <div class=\"swatch\" data-color=\"#DC2626\" style=\"background:#DC2626\"><\u002Fdiv>\n        <div class=\"swatch\" data-color=\"#0F172A\" style=\"background:#0F172A\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <span class=\"lbl\">Display font<\u002Fspan>\n      <div class=\"font-opts\" id=\"displayFonts\">\n        <div class=\"font-opt active\" data-font=\"'Instrument Serif', serif\"><span class=\"sample\" style=\"font-family:'Instrument Serif',serif\">Aa<\u002Fspan><span class=\"name\">Editorial<\u002Fspan><\u002Fdiv>\n        <div class=\"font-opt\" data-font=\"'Fraunces', serif\"><span class=\"sample\" style=\"font-family:'Fraunces',serif\">Aa<\u002Fspan><span class=\"name\">Warm Serif<\u002Fspan><\u002Fdiv>\n        <div class=\"font-opt\" data-font=\"'Space Grotesk', sans-serif\"><span class=\"sample\" style=\"font-family:'Space Grotesk',sans-serif\">Aa<\u002Fspan><span class=\"name\">Modern<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <span class=\"lbl\">Body font<\u002Fspan>\n      <div class=\"font-opts\" id=\"bodyFonts\">\n        <div class=\"font-opt active\" data-font=\"'Geist', sans-serif\"><span class=\"sample\" style=\"font-family:'Geist',sans-serif\">Aa<\u002Fspan><span class=\"name\">Geist<\u002Fspan><\u002Fdiv>\n        <div class=\"font-opt\" data-font=\"'DM Sans', sans-serif\"><span class=\"sample\" style=\"font-family:'DM Sans',sans-serif\">Aa<\u002Fspan><span class=\"name\">DM Sans<\u002Fspan><\u002Fdiv>\n        <div class=\"font-opt\" data-font=\"'IBM Plex Sans', sans-serif\"><span class=\"sample\" style=\"font-family:'IBM Plex Sans',sans-serif\">Aa<\u002Fspan><span class=\"name\">IBM Plex<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <footer>\n    <span>Saved automatically<\u002Fspan>\n    <button id=\"resetBrand\">Reset to default<\u002Fbutton>\n  <\u002Ffooter>\n<\u002Faside>\n\n<script>\n  /* ─── Section nav scroll-spy ─────────────────── */\n  const navLinks = document.querySelectorAll('#navtabs a');\n  const sections = ['offers','how','say'].map(id => document.getElementById(id));\n  function onScroll(){\n    const y = window.scrollY + 120;\n    let active = sections[0].id;\n    for (const s of sections){ if (s.offsetTop <= y) active = s.id; }\n    navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + active));\n  }\n  window.addEventListener('scroll', onScroll, {passive:true});\n  navLinks.forEach(a => a.addEventListener('click', e => {\n    e.preventDefault();\n    const id = a.getAttribute('href').slice(1);\n    document.getElementById(id).scrollIntoView({behavior:'smooth', block:'start'});\n  }));\n\n  /* ─── Filter ─────────────────────────────────── */\n  const filterInput = document.getElementById('filter');\n  function applyFilter(){\n    const q = filterInput.value.trim().toLowerCase();\n    document.querySelectorAll('table.t').forEach(tbl => {\n      let visible = 0;\n      tbl.querySelectorAll('tbody tr').forEach(tr => {\n        const match = !q || tr.textContent.toLowerCase().includes(q);\n        tr.classList.toggle('hide', !match);\n        if (match) visible++;\n      });\n      const key = tbl.classList.contains('t1') ? 't1' : tbl.classList.contains('t2') ? 't2' : 't3';\n      const counter = document.querySelector('[data-count-of=\"' + key + '\"]');\n      if (counter) counter.textContent = visible;\n    });\n  }\n  filterInput.addEventListener('input', applyFilter);\n  window.addEventListener('keydown', e => {\n    if (e.key === '/' && document.activeElement !== filterInput){\n      e.preventDefault(); filterInput.focus(); filterInput.select();\n    }\n    if (e.key === 'Escape' && document.activeElement === filterInput){\n      filterInput.value = ''; applyFilter(); filterInput.blur();\n    }\n  });\n\n  /* ─── Brand drawer ───────────────────────────── */\n  const KEY = 'aeo-cockpit-brand-v1';\n  const DEFAULTS = {\n    workspace: 'AEO Sales Cockpit',\n    logo: null,\n    accent: '#FF552E',\n    displayFont: \"'Instrument Serif', serif\",\n    bodyFont: \"'Geist', sans-serif\",\n  };\n  let brand = {...DEFAULTS};\n  try {\n    const saved = JSON.parse(localStorage.getItem(KEY) || 'null');\n    if (saved) brand = {...DEFAULTS, ...saved};\n  } catch(e) {}\n\n  const accentSoftFor = hex => {\n    const h = hex.replace('#','');\n    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);\n    return `rgba(${r}, ${g}, ${b}, 0.12)`;\n  };\n  const accentInkFor = hex => {\n    const h = hex.replace('#','');\n    let r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);\n    // darken by ~50%\n    r = Math.round(r*.40); g = Math.round(g*.40); b = Math.round(b*.40);\n    return `rgb(${r}, ${g}, ${b})`;\n  };\n\n  function applyBrand(){\n    const root = document.documentElement.style;\n    root.setProperty('--accent', brand.accent);\n    root.setProperty('--accent-soft', accentSoftFor(brand.accent));\n    root.setProperty('--accent-ink', accentInkFor(brand.accent));\n    root.setProperty('--font-display', brand.displayFont);\n    root.setProperty('--font-body', brand.bodyFont);\n\n    document.getElementById('workspaceName').textContent = brand.workspace || DEFAULTS.workspace;\n    document.getElementById('wsInput').value = brand.workspace === DEFAULTS.workspace ? '' : (brand.workspace || '');\n\n    // logo\n    const mark = document.getElementById('brandMark');\n    const prev = document.getElementById('logoPrev');\n    if (brand.logo){\n      mark.classList.add('has-img');\n      mark.innerHTML = '<img alt=\"logo\" src=\"' + brand.logo + '\" />';\n      prev.innerHTML = '<img alt=\"logo\" src=\"' + brand.logo + '\" />';\n    } else {\n      mark.classList.remove('has-img');\n      // Derive 2-letter initials from workspace\n      const ws = (brand.workspace || DEFAULTS.workspace).trim();\n      const initials = ws.split(/\\s+/).slice(0,2).map(w => w[0] || '').join('').toUpperCase() || 'AE';\n      mark.textContent = initials.slice(0,2);\n      prev.innerHTML = '<span class=\"ph\">LOGO<\u002Fspan>';\n    }\n\n    // swatches active\n    document.querySelectorAll('#swatches .swatch').forEach(el => {\n      el.classList.toggle('active', el.dataset.color.toLowerCase() === brand.accent.toLowerCase());\n    });\n    document.querySelectorAll('#displayFonts .font-opt').forEach(el => {\n      el.classList.toggle('active', el.dataset.font === brand.displayFont);\n    });\n    document.querySelectorAll('#bodyFonts .font-opt').forEach(el => {\n      el.classList.toggle('active', el.dataset.font === brand.bodyFont);\n    });\n  }\n\n  function save(){\n    try { localStorage.setItem(KEY, JSON.stringify(brand)); } catch(e) {}\n    applyBrand();\n  }\n\n  // Drawer open/close\n  const scrim = document.getElementById('scrim');\n  const drawer = document.getElementById('drawer');\n  function openDrawer(){ scrim.classList.add('open'); drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false'); }\n  function closeDrawer(){ scrim.classList.remove('open'); drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); }\n  document.getElementById('openBrand').addEventListener('click', openDrawer);\n  document.getElementById('closeBrand').addEventListener('click', closeDrawer);\n  scrim.addEventListener('click', closeDrawer);\n  window.addEventListener('keydown', e => { if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer(); });\n\n  // Workspace name\n  document.getElementById('wsInput').addEventListener('input', e => {\n    const v = e.target.value.trim();\n    brand.workspace = v || DEFAULTS.workspace;\n    save();\n  });\n\n  // Logo upload + drag/drop\n  const logoFile = document.getElementById('logoFile');\n  const logoDrop = document.getElementById('logoDrop');\n  function readLogo(file){\n    if (!file || !file.type.startsWith('image/')) return;\n    const reader = new FileReader();\n    reader.onload = ev => { brand.logo = ev.target.result; save(); };\n    reader.readAsDataURL(file);\n  }\n  logoFile.addEventListener('change', e => readLogo(e.target.files[0]));\n  ['dragenter','dragover'].forEach(t => logoDrop.addEventListener(t, e => { e.preventDefault(); logoDrop.classList.add('drag'); }));\n  ['dragleave','drop'].forEach(t => logoDrop.addEventListener(t, e => { e.preventDefault(); logoDrop.classList.remove('drag'); }));\n  logoDrop.addEventListener('drop', e => { if (e.dataTransfer.files.length) readLogo(e.dataTransfer.files[0]); });\n  document.getElementById('clearLogo').addEventListener('click', () => { brand.logo = null; logoFile.value=''; save(); });\n\n  // Swatches\n  document.querySelectorAll('#swatches .swatch').forEach(el => {\n    el.addEventListener('click', () => { brand.accent = el.dataset.color; save(); });\n  });\n\n  // Font options\n  document.querySelectorAll('#displayFonts .font-opt').forEach(el => {\n    el.addEventListener('click', () => { brand.displayFont = el.dataset.font; save(); });\n  });\n  document.querySelectorAll('#bodyFonts .font-opt').forEach(el => {\n    el.addEventListener('click', () => { brand.bodyFont = el.dataset.font; save(); });\n  });\n\n  // Reset\n  document.getElementById('resetBrand').addEventListener('click', () => {\n    brand = {...DEFAULTS};\n    logoFile.value = '';\n    save();\n  });\n\n  applyBrand();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
